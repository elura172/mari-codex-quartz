<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Mari Codex - Ring State</title>
<style>
  :root{ --bg:#000; --fg:#fff; --muted:rgba(255,255,255,.18); --soft:rgba(255,255,255,.10); }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--fg); overflow:hidden; }
  canvas{ display:block; width:100vw; height:100vh; background:#000; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
(() => {
  // ======= Canvas / DPR =======
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha:false, desynchronized:true });
  let W=0,H=0,DPR=1;
  function resize(){
    DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    W = Math.floor(innerWidth * DPR);
    H = Math.floor(innerHeight * DPR);
    canvas.width = W; canvas.height = H;
  }
  addEventListener("resize", resize, {passive:true});
  resize();

  // ======= CONSTANTS =======
  const TAU = 2 * Math.PI;
  const MIDI_NOTE_A4 = 69;

  // ======= STATE =======
  const state = {
    breathDepth: 0.35,
    tempo: 0.75,
    coherence: 0.5,
    sigma: 0.5,
    tetraEnv: 0.2,
    polarEnv: 0.3,
    ax_ha: 0.65,
    ax_sha: 0.55,
    ax_aum: 0.60,
    ax_tha: 0.50,
    ax_rr: 0.35,
    ax_mm: 0.40,
    ax_kh: 0.45,
    tetraMode: "misty",
    running: true
  };

  // ======= ANIMATION LOOP =======
  let phaseAcc = 0;

  function step(dt) {
    phaseAcc += dt * (0.5 + state.tempo * 2.0);
  }

  function clamp01(x) {
    return Math.max(0, Math.min(1, x));
  }

  function wrapTau(a) {
    while (a < 0) a += TAU;
    while (a >= TAU) a -= TAU;
    return a;
  }

  // ======= TETRAHEDRON HELPERS =======
  function buildTetra(ha, sha, aum, tha) {
    const ha_rad = ha * Math.PI;
    const sha_rad = sha * Math.PI;
    const aum_rad = aum * Math.PI;
    const tha_rad = tha * Math.PI;

    const v1 = [
      Math.sin(ha_rad) * Math.cos(sha_rad),
      Math.sin(ha_rad) * Math.sin(sha_rad),
      Math.cos(ha_rad)
    ];
    const v2 = [
      Math.sin(aum_rad) * Math.cos(tha_rad),
      Math.sin(aum_rad) * Math.sin(tha_rad),
      Math.cos(aum_rad)
    ];
    const v3 = [
      Math.sin((ha_rad + aum_rad) / 2) * Math.cos((sha_rad + tha_rad) / 2 + Math.PI / 3),
      Math.sin((ha_rad + aum_rad) / 2) * Math.sin((sha_rad + tha_rad) / 2 + Math.PI / 3),
      Math.cos((ha_rad + aum_rad) / 2)
    ];
    const v4 = [
      Math.sin((ha_rad + aum_rad) / 2) * Math.cos((sha_rad + tha_rad) / 2 - Math.PI / 3),
      Math.sin((ha_rad + aum_rad) / 2) * Math.sin((sha_rad + tha_rad) / 2 - Math.PI / 3),
      Math.cos((ha_rad + aum_rad) / 2)
    ];

    return { verts: [v1, v2, v3, v4] };
  }

  function norm3(v) {
    const len = Math.sqrt(v[0]*v[0] + v[1]*v[1] + v[2]*v[2]);
    return len > 0 ? [v[0]/len, v[1]/len, v[2]/len] : [0,0,1];
  }

  function cross3(a, b) {
    return [
      a[1]*b[2] - a[2]*b[1],
      a[2]*b[0] - a[0]*b[2],
      a[0]*b[1] - a[1]*b[0]
    ];
  }

  function dot3(a, b) {
    return a[0]*b[0] + a[1]*b[1] + a[2]*b[2];
  }

  function sub3(a, b) {
    return [a[0]-b[0], a[1]-b[1], a[2]-b[2]];
  }

  // ======= RING DRAWING =======
  function drawRing(cx, cy, r, coreA, haloA, tint) {
    if (haloA > 0.001) {
      ctx.strokeStyle = `rgba(${tint[0]},${tint[1]},${tint[2]},${haloA})`;
      ctx.lineWidth = 7.5 * DPR;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, TAU);
      ctx.stroke();
    }
    if (coreA > 0.001) {
      ctx.strokeStyle = `rgba(${tint[0]},${tint[1]},${tint[2]},${coreA})`;
      ctx.lineWidth = 1.2 * DPR;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, TAU);
      ctx.stroke();
    }
  }

  function drawPointsOnRing(cx, cy, r, pts, alpha, style) {
    if (alpha < 0.001) return;
    style = style || { haloR: 6, coreR: 2, haloGain: 1, coreGain: 1, breathCouple: 0.1 };
    for (let p of pts) {
      const x = cx + p[0] * r;
      const y = cy + p[1] * r;
      const ha = alpha * style.haloGain;
      const ca = alpha * style.coreGain;
      ctx.fillStyle = `rgba(255,255,255,${ha})`;
      ctx.beginPath();
      ctx.arc(x, y, style.haloR * DPR, 0, TAU);
      ctx.fill();
      ctx.fillStyle = `rgba(255,255,255,${ca})`;
      ctx.beginPath();
      ctx.arc(x, y, style.coreR * DPR, 0, TAU);
      ctx.fill();
    }
  }

  function drawArcFlash(cx, cy, r, theta, strength) {
    const arcWidth = 0.15 * TAU;
    ctx.strokeStyle = `rgba(255,255,255,${strength * 0.6})`;
    ctx.lineWidth = 12 * DPR;
    ctx.beginPath();
    ctx.arc(cx, cy, r, theta - arcWidth/2, theta + arcWidth/2);
    ctx.stroke();
    ctx.strokeStyle = `rgba(255,255,255,${strength})`;
    ctx.lineWidth = 3 * DPR;
    ctx.beginPath();
    ctx.arc(cx, cy, r, theta - arcWidth/2, theta + arcWidth/2);
    ctx.stroke();
  }

  function drawGhostTetra(ctx, verts, edges, cx, cy, scale, env, mist, flash) {
    // Removed: tetrahedron edge drawing
    // Only vertex highlights remain
  }

  // ======= RING BASIS =======
  function buildRingBasis(axis) {
    const Z = norm3(axis);
    let X;
    if (Math.abs(Z[2]) < 0.99) {
      X = norm3(cross3(Z, [0,0,1]));
    } else {
      X = [1,0,0];
    }
    const Y = norm3(cross3(X, Z));
    return { X, Y, Z };
  }

  function projectToRingPlane(v, basis) {
    const x = dot3(v, basis.X);
    const y = dot3(v, basis.Y);
    const norm = Math.sqrt(x*x + y*y);
    return norm > 0.001 ? [x/norm, y/norm] : [1, 0];
  }

  // ======= MAIN DRAW FUNCTION =======
  function draw() {
    const phase = phaseAcc;
    const cx = W * 0.5;
    const cy = H * 0.5;
    const baseRadius = Math.min(W, H) * 0.15;

    // Clear
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, W, H);

    // Build tetrahedron
    const tetra = buildTetra(state.ax_ha, state.ax_sha, state.ax_aum, state.ax_tha);
    const verts = tetra.verts;

    // Breath modulation
    const inhaleCycle = Math.sin(phase * 2.0);
    const exhaleDepth = (1.0 - Math.cos(phase * 2.0)) * 0.5;
    const breathDepth = state.breathDepth;
    const inhaleComposite = inhaleCycle * breathDepth * 1.2;
    const pulseEnv = 0.5 + 0.5 * Math.sin(phase * 3.2);

    // Ring parameters
    const coherence = state.coherence;
    const ringVis = {
      when: 0.8 + 0.2 * Math.sin(phase * 0.8),
      where: 0.85 + 0.15 * Math.sin(phase * 1.1),
      from: 0.75 + 0.25 * Math.sin(phase * 0.6)
    };

    const staticRings = [
      {
        id: "x",
        basis: buildRingBasis([1, 0, 0]),
        glow: { core: 0.35, halo: 0.15 },
        tint: [200, 150, 255],
        spiralPhase: 0.8
      },
      {
        id: "y",
        basis: buildRingBasis([0, 1, 0]),
        glow: { core: 0.3, halo: 0.12 },
        tint: [255, 180, 100],
        spiralPhase: 0.7
      },
      {
        id: "z",
        basis: buildRingBasis([0, 0, 1]),
        glow: { core: 0.32, halo: 0.14 },
        tint: [100, 200, 255],
        spiralPhase: 0.75
      }
    ];

    const dynamicRings = [
      {
        id: "when",
        basis: buildRingBasis([1, 1, 0]),
        glow: { core: 0.28, halo: 0.11 },
        tint: [200, 200, 150],
        spiralPhase: coherence
      },
      {
        id: "where",
        basis: buildRingBasis([1, 0, 1]),
        glow: { core: 0.30, halo: 0.13 },
        tint: [255, 100, 150],
        spiralPhase: coherence * 0.9
      },
      {
        id: "from",
        basis: buildRingBasis([0, 1, 1]),
        glow: { core: 0.29, halo: 0.12 },
        tint: [100, 255, 150],
        spiralPhase: coherence * 0.85
      }
    ];

    const R0 = baseRadius;

    // Draw static rings
    for (let i = 0; i < staticRings.length; i++) {
      const r = staticRings[i];
      const R_static = [R0*1.00, R0*1.12, R0*1.24][i];
      const coreA = r.glow.core;
      const haloA = r.glow.halo;
      drawRing(cx, cy, R_static, coreA, haloA, r.tint);

      const pts2 = verts.map(v => projectToRingPlane(v, r.basis));
      drawPointsOnRing(cx, cy, R_static, pts2, 0.62);
    }

    // Draw dynamic rings
    const R_dyn = [R0*0.50, R0*0.65, R0*1.30];
    const dynAmt = [ringVis.when, ringVis.where, ringVis.from];

    for (let i = 0; i < dynamicRings.length; i++) {
      const r = dynamicRings[i];
      const amt = dynAmt[i];
      if (amt < 0.02) continue;

      const spiralProgress = r.spiralPhase;
      const spiralScale = 1.0 + (1.0 - spiralProgress) * 0.45;
      const currentR = R_dyn[i] * spiralScale;

      let coreA = r.glow.core * amt * spiralProgress;
      let haloA = r.glow.halo * amt * spiralProgress;

      if (i === 1) {
        const pulseFactor = 0.88 + 0.12 * Math.sin(phase * 1.8);
        coreA *= pulseFactor;
        haloA *= pulseFactor;
      } else if (i === 2) {
        const breathMod = 0.85 + 0.15 * Math.abs(inhaleComposite);
        const tempoMod = 0.92 + 0.08 * Math.sin(phase * (1.0 + state.tempo * 0.2));
        const coherenceMod = 0.88 + 0.12 * coherence;
        coreA *= breathMod * tempoMod * coherenceMod;
        haloA *= breathMod * tempoMod;
      }

      let gap = 0.0;
      if (i === 0) {
        const minGap = 0.18;
        const maxGap = 0.40;
        const a = clamp01(amt);
        const ease = Math.pow(a, 1.25);
        let baseGap = maxGap - (maxGap - minGap) * ease;
        const amp = (0.012 + 0.020 * clamp01(breathDepth / 2)) * (1.0 - a);
        const shimmer = 0.006 * pulseEnv * (1.0 - a);
        gap = baseGap + (amp + shimmer) * inhaleComposite;
        gap = Math.max(minGap, Math.min(maxGap, gap));
      }

      const a0 = gap * TAU * 0.5;
      const a1 = TAU - a0;

      let drawR = currentR;
      if (i === 2) {
        const radiusBreath = 1.0 + 0.04 * inhaleComposite * breathDepth;
        drawR = currentR * radiusBreath;
      }

      ctx.strokeStyle = `rgba(${r.tint[0]},${r.tint[1]},${r.tint[2]},${haloA})`;
      ctx.lineWidth = 7.5 * DPR;
      ctx.beginPath();
      ctx.arc(cx, cy, drawR, a0, a1);
      ctx.stroke();

      ctx.strokeStyle = `rgba(${r.tint[0]},${r.tint[1]},${r.tint[2]},${coreA})`;
      ctx.lineWidth = 1.2 * DPR;
      ctx.beginPath();
      ctx.arc(cx, cy, drawR, a0, a1);
      ctx.stroke();

      const pts2 = verts.map(v => projectToRingPlane(v, r.basis));

      let pointAlpha;
      if (i === 1) {
        pointAlpha = (0.70 + 0.45*amt) * spiralProgress;
      } else if (i === 2) {
        pointAlpha = (0.60 + 0.40*amt) * spiralProgress * (0.85 + 0.15 * Math.abs(inhaleComposite));
      } else {
        pointAlpha = (0.22 + 0.28*amt) * spiralProgress;
      }

      const pointStyle =
        (i === 0) ? { haloR: 6.2, coreR: 2.2, haloGain: 1.0,  coreGain: 1.0,  breathCouple: 0.14 } :
        (i === 1) ? { haloR: 9.2, coreR: 2.7, haloGain: 1.35, coreGain: 1.25, breathCouple: 0.22 } :
                    { haloR: 8.0, coreR: 2.5, haloGain: 1.20, coreGain: 1.18, breathCouple: 0.20 };

      drawPointsOnRing(cx, cy, drawR, pts2, pointAlpha, pointStyle);
    }
  }

  // ======= RAF LOOP =======
  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.033, Math.max(0.001, (now - last) / 1000));
    last = now;

    if (state.running) step(dt);
    draw();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

})();
</script>
</body>
</html>
